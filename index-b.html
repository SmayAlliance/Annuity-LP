ion:relative}#_form_4_ ._form-body{font-family:Roboto;font-size:14px;font-weight:400;co... (truncated)

    addEvent(window, 'resize', resize_tooltips);

    var initializePhoneInput = function(inputPhone) {

        const stylesheetLink = document.createElement('link');
        stylesheetLink.rel = 'stylesheet';
        stylesheetLink.href = 'https://cdn.jsdelivr.net/npm/intl-tel-input@25.2.0/build/css/intlTelInput.css';
        document.head.appendChild(stylesheetLink);

        window._load_script('https://cdn.jsdelivr.net/npm/intl-tel-input@25.2.0/build/js/intlTelInput.min.js', function() {
            inputPhone.setAttribute("name", "phone-iti");
            iti = intlTelInput(inputPhone, {
                loadUtils: () => import('https://cdn.jsdelivr.net/npm/intl-tel-input@25.2.0/build/js/utils.js'),
                hiddenInput: (telInputName) => ({
                    phone: 'phone'
                }),
                separateDialCode: true,
                autoPlaceholder: 'aggressive',
                initialCountry: "us",
            });
        }, false);
    }
    var form_to_submit = document.getElementById('_form_4_');
    if (!form_to_submit) form_to_submit = document.querySelector('#_form_4_');
    if (typeof window._load_script === 'undefined') {
        window._load_script = function(url, callback, isSubmit) {
            var script = document.createElement('script');
            script.charset = 'utf-8';
            script.src = url;
            script.onload = function() { if (callback) callback(); };
            script.onerror = function() {
                if (isSubmit) {
                    var submitButton = document.querySelector('button[type="submit"]');
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.classList.remove('processing');
                    }
                }
            };
            document.head.appendChild(script);
        };
    }
    if (typeof window._show_error === 'undefined') {
        window._show_error = function(id, message, html) {
            var form = document.getElementById('_form_4_');
            if (form) {
                var err = document.createElement('div');
                err.className = '_error-inner _form_error _no_arrow';
                err.innerHTML = message;
                var button = form.querySelector('button[type="submit"]');
                if (button) button.parentNode.insertBefore(err, button);
            } else {
                console.error(message);
            }
        };
    }
    var inputPhone = form_to_submit.querySelector("#phone");
    if(inputPhone) {
        initializePhoneInput(inputPhone);
    }

    var _form_serialize = function(form){if(!form||form.nodeName!=="FORM"){return }var i,j,q=[];for(i=0;i<form.elements.length;i++){if(form.elements[i].name===""){continue}switch(form.elements[i].nodeName){case"INPUT":switch(form.elements[i].type){case"tel":q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].previousSibling.querySelector('div.iti__selected-dial-code').innerText)+encodeURIComponent(" ")+encodeURIComponent(form.elements[i].value));break;case"text":case"number":case"date":case"time":case"hidden":case"password":case"button":case"reset":case"submit":q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].value));break;case"checkbox":case"radio":if(form.elements[i].checked){q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].value))}break;case"file":break}break;case"TEXTAREA":q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].value));break;case"SELECT":switch(form.elements[i].type){case"select-one":q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].value));break;case"select-multiple":for(j=0;j<form.elements[i].options.length;j++){if(form.elements[i].options[j].selected){q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].options[j].value))}}break}break;case"BUTTON":switch(form.elements[i].type){case"reset":case"submit":case"button":q.push(form.elements[i].name+"="+encodeURIComponent(form.elements[i].value));break}break}}return q.join("&")};

    const formSupportsPost = false;
    var form_submit = function(e) {

        e.preventDefault();
        if (validate_form()) {
            if(form_to_submit.querySelector('input[name="phone"]') && typeof iti != 'undefined') {
                form_to_submit.querySelector('input[name="phone"]').value = iti.getNumber();
            }
                var submitButton = e.target.querySelector('#_form_4_submit') || e.target.querySelector('button[type="submit"]');
                if (submitButton) {
                submitButton.disabled = true;
                submitButton.classList.add('processing');
                }
                    var serialized = _form_serialize(document.getElementById('_form_4_')).replace(/%0A/g, '\\n');
            var err = form_to_submit.querySelector('._form_error');
            err ? err.parentNode.removeChild(err) : false;
            async function submitForm() {
                var formData = new FormData();
                const searchParams = new URLSearchParams(serialized);
                searchParams.forEach((value, key) => {
                    if (key !== 'hideButton') {
                        formData.append(key, value);
                    }
                });
                let request = {
                    headers: {
                        "Accept": "application/json"
                    },
                    body: formData,
                    method: "POST"
                };

                let pageUrlParams = new URLSearchParams(window.location.search);
                if (pageUrlParams.has('t')) {
                    request.headers.Authorization = 'Bearer ' + pageUrlParams.get('t');
                }
                const response = await fetch('https://unitedadvisors.activehosted.com/proc.php?jsonp=true', request);

                return response.json();
            }
            if (formSupportsPost) {
                submitForm().then((data) => {
                    eval(data.js);
                }).catch(() => {
                    _show_error("1", "Sorry, your submission failed. Please try again.");
                });
            } else {
                _load_script('https://unitedadvisors.activehosted.com/proc.php?' + serialized + '&jsonp=true', null, true);
            }
        }
        return false;
    };
    addEvent(form_to_submit, 'submit', form_submit);
})();

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var modal = document.getElementById('guide-modal');
        var openButtons = document.querySelectorAll('.open-modal');
        var closeButton = modal ? modal.querySelector('.modal-close') : null;

        function openModal() {
            if (!modal) return;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            if (!modal) return;
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        openButtons.forEach(function (button) {
            button.addEventListener('click', function (event) {
                event.preventDefault();
                openModal();
            });
        });

        if (closeButton) {
            closeButton.addEventListener('click', function () {
                closeModal();
            });
        }

        if (modal) {
            modal.addEventListener('click', function (event) {
                if (event.target === modal) {
                    closeModal();
                }
            });
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && modal && modal.classList.contains('open')) {
                closeModal();
            }
        });
    });
</script>
